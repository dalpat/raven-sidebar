<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512">
  <defs>
    <!-- Base Drop Shadow for the Monitor -->
    <filter id="baseShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Left Drop Shadow for the Sidebar to give it elevation -->
    <filter id="sidebarShadow" x="-30%" y="-20%" width="150%" height="140%">
      <feDropShadow dx="-6" dy="0" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- GNOME Dark Background Gradient -->
    <linearGradient id="desktopGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241f31" />
      <stop offset="100%" stop-color="#1e1b26" />
    </linearGradient>

    <!-- GNOME Blue Sidebar Gradient -->
    <linearGradient id="sidebarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3584e4" />
      <stop offset="100%" stop-color="#1a5fb4" />
    </linearGradient>

    <!-- Clip Path to keep elements inside the rounded monitor -->
    <clipPath id="screenClip">
      <rect x="16" y="32" width="224" height="192" rx="20" />
    </clipPath>
  </defs>

  <!-- 1. Monitor Base (with shadow) -->
  <rect x="16" y="32" width="224" height="192" rx="20" fill="url(#desktopGrad)" filter="url(#baseShadow)"/>

  <!-- Inside the Screen -->
  <g clip-path="url(#screenClip)">
    
    <!-- Subtle Desktop Background Swoosh -->
    <path d="M -20 160 Q 128 80 260 200 L 260 256 L -20 256 Z" fill="#3584e4" opacity="0.06" />
    
    <!-- GNOME Top Bar -->
    <rect x="16" y="32" width="224" height="20" fill="#000000" opacity="0.4" />
    <rect x="116" y="38" width="24" height="8" rx="4" fill="#ffffff" opacity="0.5" />

    <!-- 2. The Raven Sidebar sliding out from the right -->
    <rect x="140" y="32" width="100" height="192" fill="url(#sidebarGrad)" filter="url(#sidebarShadow)" />

    <!-- 3. Sidebar UI Elements (Widgets) -->
    
    <!-- User Avatar & Name -->
    <circle cx="166" cy="70" r="12" fill="#ffffff" opacity="0.9" />
    <rect x="186" y="66" width="38" height="8" rx="4" fill="#ffffff" opacity="0.9" />

    <!-- Widget 1: Media Player / Calendar -->
    <rect x="156" y="100" width="68" height="40" rx="8" fill="#ffffff" opacity="0.2" />
    <circle cx="176" cy="120" r="8" fill="#ffffff" opacity="0.3" />
    <rect x="190" y="112" width="24" height="6" rx="3" fill="#ffffff" opacity="0.3" />
    <rect x="190" y="122" width="16" height="4" rx="2" fill="#ffffff" opacity="0.3" />

    <!-- Widget 2: Square Buttons / Toggles -->
    <rect x="156" y="152" width="30" height="30" rx="8" fill="#ffffff" opacity="0.2" />
    <rect x="194" y="152" width="30" height="30" rx="8" fill="#ffffff" opacity="0.2" />

    <!-- Widget 3: Notification List -->
    <rect x="156" y="196" width="68" height="6" rx="3" fill="#ffffff" opacity="0.15" />
    <rect x="156" y="208" width="48" height="6" rx="3" fill="#ffffff" opacity="0.15" />

  </g>

  <!-- 4. Glossy Monitor Outline (Stroke over everything) -->
  <rect x="16" y="32" width="224" height="192" rx="20" fill="none" stroke="#3d3846" stroke-width="2" />

</svg>